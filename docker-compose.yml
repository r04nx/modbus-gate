version: '3.8'

services:
  # Modbus TCP Server for testing
  modbus-server:
    build: ./modbus-server
    ports:
      - "502:502"
    restart: unless-stopped

  # SNMP Agent for testing
  snmp-agent:
    image: tandrup/snmpsim
    ports:
      - "161:161/udp"
    restart: unless-stopped
    volumes:
      - ./snmp_data:/usr/share/snmpsim/data
    command: --agent-udpv4-endpoint=0.0.0.0:161

  # OPC UA Server for testing
  opcua-server:
    image: iotechsys/opcua-server
    ports:
      - "4840:4840"
    environment:
      - OPCUA_SERVER_PORT=4840
    restart: unless-stopped
    command: >
      sh -c "python3 -c '
      from opcua import Server
      import time
      
      server = Server()
      server.set_endpoint(\"opc.tcp://0.0.0.0:4840/freeopcua/server/\")
      server.set_server_name(\"Test OPC UA Server\")
      
      uri = \"http://examples.freeopcua.github.io\"
      idx = server.register_namespace(uri)
      
      objects = server.get_objects_node()
      myobj = objects.add_object(idx, \"TestObject\")
      myvar = myobj.add_variable(idx, \"TestVariable\", 42)
      myvar.set_writable()
      
      server.start()
      print(\"OPC UA Server started at opc.tcp://0.0.0.0:4840/freeopcua/server/\")
      
      try:
          while True:
              time.sleep(1)
      finally:
          server.stop()
      '"
